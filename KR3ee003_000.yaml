下人迎缺盆底下膈入胃絡脾宮直者缺盆下乳內一支幽門循腹裡下行直合氣沖中遂由髀關抵膝臏䯒骨付中指內關同一支下膝注三里別出中指外關通一支別走足跗指大指之端經盡矣此經多氣復多血是動欠伸面顏黑悽悽惡寒畏見人忽聞木聲心驚惕登高而歌棄衣走甚則腹脹仍賁響凡此諸疾皆骭厥所生病者為狂瘧濕溫汗出鼻流血口喎唇裂又喉痹膝臏疼痛腹脹結氣膺伏兔䯒外廉足跗中指俱痛徹有餘消穀溺色黃不是身前寒振栗胃房脹滿食不消氣盛身前皆有熱太陰脾起足大指上循內側白肉際核骨之後內踝前上腧循䯒脛膝里股肉前廉入腹中屬脾絡胃與膈通俠喉連舌散舌下支絡從胃注心宮此經氣盛而血衰是動其病氣所為食下即吐胃腕痛更兼身體痛難移腹脹善噫舌本強所生病者舌無痛體重不食亦如之煩心心下仍急痛泄水溏瘕寒瘧隨不臥強立股膝腫疸發身黃大指痿手少陰經起心中下膈直與小腸通支者還從肺系走直上咽喉系目瞳直者上肺出腋下臑後肘內少海從臂內後廉抵掌中鋭骨之端注少衝多氣少血屬此經是動心疲痛難忍渴欲飲水咽乾燥所生脅痛目如金脅臂之內後廉痛掌中有熱向經尋手太陽經小腸脈小指之端起少澤循乎外廉出踝中循臂骨出肘內側上循臑外出後廉直過肩解繞肩甲交肩下入缺盆內向液絡心循咽嗌下膈抵胃屬小腸一支缺盆貫頸頰至目鋭眥卻入耳復沿耳前仍上頰抵鼻外至目內眥斜絡與顴別絡接此經少氣還多血是動則病痛咽嗌頷下腫兮不可顧肩如拔兮臑如折所生病主肩臑痛耳聾目黃腫腮頰肘臂之外後廉痛部分猶當細分別足經太陽膀胱脈目內皆上起額尖支者巔上至耳角直者從巔腦後懸絡腦環出別下項仍循肩膊夾脊邊抵腰膂腎膀胱內一支下與溲陰連貫臀斜入委中穴一支膊內左右別大脾夾脊過脾樞臂內後廉膕中合下貫腨內外踝後京骨之下指外側此經血多氣又少是動頭疼不可當項如拔兮腰似折髀強痛徹脊中央膕如結兮腨如裂是為踝厥筋乃傷所生瘧痔小指廢頭囟頂痛目色黃腰尻膕腳疼連背淚流鼻衄及顛狂足經腎脈屬少陰小指斜趨湧泉心然谷之下內踝後別入跟中腨內侵出膕內廉上股內貫脊屬腎膀胱臨直者屬腎貫肝膈入肺循喉舌本尋支者從肺絡心內仍至胸中部分深此經多氣而少血是動病機不欲食喘嗽吐血喉中鳴坐而欲起面如垢目視䀮䀮氣不足心懸如飢常惕惕所生病者為舌乾口熱咽痛氣賁逼股內後廉並脊疼心腸煩痛疽而癖痿厥嗜臥體怠惰足下熱痛皆腎厥手厥陰心主起胸屬包下膈三焦宮支者循胸出脅下脅下連腋三寸同仍上抵腋循臑內太陰少陰兩經中指透中衝支者別小指次指絡相通包絡少氣原多血是動則病手中熱肘臂攣急腋下腫甚則胞脅支滿結心中淡淡或大動善哭目黃面赤色所生病者為煩心心痛掌熱病之則手經少陽三焦脈起自小指次指濡兩指岐骨手腕表上出臂外兩骨間肘後臑外循肩上少陽之後交別傳下入缺盆膻中分散絡心包鬲里穿支者膻中缺盆上上項耳後耳角旋屈下注頤仍注頰一支出耳入耳前去從上關交曲頰至目內眥乃盡焉三焦少氣還多血是動耳鳴喉腫痹所生病者汗自出耳後痛兼目鋭眥肩臑肘臂盡皆疼小指次指亦如廢足脈少陽膽之經始從兩目鋭眥生抵頭循角下耳後腦空風池次第行手少陽前至肩上交少陽右上缺盆支者耳後貫耳內出走耳前鋭眥循一支鋭眥大迎下合手少陽底項根下加頰車缺盆合入胸貫鬲絡肝經屬膽仍從脅裡過下入氣衝毛際榮橫入髀厭環跳內直者缺盆下腋膺過季脅下髀厭內出膝外廉是陽陵外輔絶骨踝前過足跗小指次指分一支別從大指去三毛之際接肝經膽經多氣而少血是動口苦善太息心脅疼痛難轉移面塵足熱體無澤所生頭痛連鋭眥缺盆腫痛並兩腋馬刀挾癭生兩旁汗出振寒咳瘧疾胸脅髀膝至䯒骨絶骨踝痛及諸節厥陰足脈肝所終大指之端毛際叢足跗上廉太衝分踝前一寸入中封上踝交出太陰後循膕內廉陰股兌環繞陰氣抵小腹夾胃屬肝絡膽逢上貫鬲里布胸肋頰喉項顙目系同脈上巔會腎脈出支者還生目系中下絡頰裡環唇內支者便從膈肺通此經血多氣少焉是動腰疼俯仰難男疝女人小腹腫面塵脫色及咽乾所生病者為胸滿嘔吐動泄小便難或時遺溺並狐疝臨症還須仔細看十五絡脈歌人身絡脈十有五我今逐一從頭數手太陰絡為列缺手少陰絡為通里手厥陰絡為內關手太陽絡支正是手陽明絡偏歷當手少陽絡外關位足太陽絡號飛揚足陽明絡豐隆系足少陽絡是光明足太陰絡公孫寄足少陰絡為大鐘足厥陰絡蠡溝配陽督之絡稱長強陰任之絡號屏醫脾之大絡大包是十五絡穴君須記千金十一穴歌三里內庭穴肚腹中妙訣曲池與合谷頭疼痛可徹腰背痛相連委中崑崙穴胞項如有痛後溪並列缺環跳與陽陵膝前兼腋脅可補即留久當瀉即疏泄三百六十名十一千金穴孫思邈十三鬼穴歌百邪顛狂所為病針有十三穴須認凡針之體先鬼宮次針鬼信無不應一一從頭逐一求男從左起女從右一針人中鬼宮停左邊下針右出針第二手大指甲下名鬼信刺三分深三針足大指甲下名曰鬼壘入二分四針掌後太陵穴八寸五分名鬼心五針申脈名鬼路火針三下七鋥鋥第六卻尋大杼上入發一寸名鬼枕七刺耳垂下五分名曰鬼狀針要溫八針承漿名鬼市從左出右君須記九針間使鬼路上十針上星名鬼堂十一陰下縫三壯女玉門頭名鬼藏十二曲池為鬼哭火針仍要七鋥鋥十三舌頭當舌中此穴須名是鬼封手足兩邊相對刺若逢孤穴只單通此是先師真妙訣猖狂惡鬼走無蹤長葉君天星祕訣歌天星祕訣少人知此法專分前後施若是胃中停宿食後尋三里起璇璣脾病血氣先合谷後刺三陰交莫遲如中鬼邪先間使手臂攣痹取肩髃腳若轉筋並眼花先針仍山次內踝腳氣痠疼肩井先次尋三里陽陵泉如使小腸連臍痛先次陰陵後湧泉耳鳴腰痛先五會次針耳門三里內小腸氣痛先長強後針大敦不要忙足緩難行先絶骨次尋條口及衝陽牙疼頭痛兼喉痹先刺二間後三里胸膈痞滿先陰交針到承山飲食喜肚腹浮腫脹膨膨先針水分泄建里傷寒過經不出汗期門通里先後看寒瘧面腫及腸鳴先取合谷後內庭冷風濕痹針何處先取環跳次陽陵指痛攣急少商好依法施之無不靈馬丹陽天星十二穴歌三里足膝下三寸兩筋間能除心腹痛善治胃中寒腸鳴並聚積中滿腳筋疼傷寒羸瘦弱氣蠱治諸般人過三旬後針灸眼重觀取穴舉足取去病不為難內庭足指內胃腕屬陽明善療四肢厥喜靜惡聞聲耳內鳴喉痛數欠及牙疼瘧疾不思食針後便醒醒曲池曲肘里曲骨陷中求能治肘中痛偏風半不收喉閉促欲死發熱更無休遍身風迄運針後即時瘳合谷在虎口兩指岐骨間頭疼並面腫瘧疾熱還寒體熱身出汗目暗視朧腨牙疼並鼻衄口噤更難言針入看深淺令人病自安委中曲膕里動脈正中央腰重不能舉沉沉腳脊梁風癇及筋轉熱病不能當膝頭難伸屈針入即安康承山在魚腹腨腸分內間善理腰疼痛痔疾大便難腳氣足下腫兩足盡寒酸瘧亂轉筋急穴中刺即安太衝足大指節後二寸中動脈知生死能醫驚癇風咽喉並心脹兩足不能行七疝偏墜腫眼目似云朦兼能療腰痛針下有神功崑崙足外踝後跟微脈尋膊重腰脊痛陽踝更連陰頭疼脊背急暴喘滿中心踏地行不得須尋此穴針環跳在足痹側臥不足舒上足屈乃得針能廢𤸚軀冷風並冷痹身體似繩拘腿重喘痛甚此穴最扶危陽陵泉膝下外廉一寸中膝腫並麻木起坐腰背重面腫胸脅滿冷痹與偏風努力坐不得起臥似衰翁針入五分後神功實不同通里腕骨後掌後一寸中欲言説不出懊惱及怔忡實則四肢重頭腮面頰紅平聲仍欠數喉閉氣難通虛則不能食暴喑面無容金針微微刺方信有神功列缺腕側上監指手交叉專療偏頭患偏風肘木麻痰涎頻壅上口噤不開牙若能明此理應手疾如拿秋夫療鬼十三穴歌人中神庭風府始舌縫承漿夾車次少商太陵間使連乳中陽陵泉有據隱白行間不可瘥十三穴是秋夫置回陽九針歌啞門勞宮三陵交湧泉太溪中腕接環跳三里合谷並此是回陽九針穴奇門經八脈歌督脈起自下極俞並於脊裡上風府過腦額鼻入齦交為陽脈海多綱要任脈起於中極淺上腹循喉承漿里陰脈之海任所為衝脈出胞至胸止從腹會咽絡口唇女人成經為血室脈並少陰之腎經與任督本於陰會三脈並起而異行陽蹺起足之跟里循外踝上入風池陰蹺內踝循喉嗌本足陰陽脈別支諸陰交起陰維穴發足少陰築賓郤諸陽會起陽維脈太陽之郤金門是帶脈周回季脅間會於維道足少陽所謂奇經之八脈維繫諸經乃順常八脈交會八穴歌公孫衝脈會心胸內關陰維下總同臨泣膽經連帶脈陽維目鋭外關逢後溪督內連背頸申脈陽蹺絡亦通列缺肺任行脈系陰蹺照海鬲喉嚨八穴相所合歌公孫偏與內關合列缺能消照海疴臨泣外關分主客後溪申脈止相和左針右病知高下以意通經廣按摩補瀉迎隨分逆順五形八法是真科十二經本一脈歌中焦肺起脈之宗出手大指之端沖大腸即起手次指上行環口交鼻里胃經原又下鼻交出足大指之端毛脾脈就起指端上注於心中少陰向心經中之入掌循手內端出小指行小腸從手小指起上斜絡肝目內眥膀胱經從目內生至足小指外側行腎脈動於小指下起注胸中過腹胯心胞出處又連胸循手小指次指中三焦起次指側環走耳前目鋭息膽家接生目眥旁走足大指三毛上足肝就起三毛際注入肺中循不已十二經穴起止歌手肺少商中府起大腸商陽迎香二足胃厲兌頭維三脾部隱白大包四膀胱睛明至陰間腎經湧泉俞府位心包中衝天池隨三焦關衝耳門繼膽家竅陰童子髎厥肝大敦期門已手心少衝極泉來小腸少澤聽宮去八會穴歌府會中腕藏章門筋會陽陵髓絶骨骨會大杼風膻中血會膈俞太淵脈七募穴歌肝募期門脾章門腎募京門心巨闕天樞關元大小腸膽募當記在日月四總穴歌肚腹三里澀腰背委中求頭項尋列缺面口合谷收十二經納天干歌甲膽乙肝丙小腸丁心戊胃己脾鄉庚屬大腸辛屬肺壬屬膀胱癸腎臟三焦亦向壬中寄包絡同歸入癸方十二經納地支晝夜流注歌肺寅大卯胃辰經脾巳心午小未中申旁酉屬心包戌亥三子膽醜肝通血忌歌行針須要明血忌正丑三寅二之未四甲五卯六酉宮七辰八戌九居巳十亥十一日午當臘子更口逢目閉年尻神歌一踝二牙腨三頭乳口間四肩尾尻骨五背面耳難六在手膊上七當腰項前八須防膝肋九肘腳疒圡連月尻神歌一足鼻柱手小指二踝髮際外踝位三股牙齒足及肝四腰胃腕陽明手五口遍身足陽明六掌胸前又在胸七內踝連氣衝膝八腕股內及陰中九尻在足膝脛後十背內踝足跗中十二經原穴歌甲出丘墟乙太衝丙居腕骨是原中丁出神門原內過戊胃衝陽氣可通己出太白庚合谷辛原本出太淵同壬歸京骨期中過癸出太溪原穴逢三焦壬是陽池穴包絡太陵癸又重腳不過膝手不過肘陽日陽時氣在前血在後兮脈在邊陰日陰時血在前氣在後兮脈在原陽日陽時針左轉先取陽經府病看陰日陰時針右轉行屬陰經臟腑痊榮衛所生歌上焦如霧中焦露谷入於經胃脈分氣血周流行上下陰陽宗氣此中明行針指要歌或針風須向風門氣海中或針水水分夾臍臍邊取或針結針著大腸泄水穴或針勞須向風門