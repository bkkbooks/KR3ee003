body:
  text: 百症歌百症俞穴再三用心總會連於玉枕頭風療以金門懸顱頷厭之中偏頭痛止強間豐隆之際頭疼難禁原夫面腫虛浮須伏水溝前項耳聾氣閉全憑聽會翳風面上蟲行有驗迎香可取耳中蟬懆有聲聽會堪攻目眩兮支正飛揚目黃兮陽綱膽俞攀睛攻少澤肝俞之所淚出刺臨泣頭維之處目中漠漠即尋攢竹三間眼覓䀮䀮急取養老天柱觀其雀目汗氣睛明行間而細推審他項強傷寒溫溜期門而主治廉泉中衝舌下腫疼堪取天府合谷鼻中吐血宜追耳門絲竹空治牙疼而頃刻頰車地倉穴止口喎於片時喉痛兮液門魚際去療轉筋兮金門丘墟來醫俠溪陽谷頷腫口噤並治少商曲澤血虛口渴同施通天去鼻內無之若復溜祛苦幹口燥之悲啞門關衝舌緩不語而要緊天突間使失音囁嚅而休遲太衝瀉唇吻以速愈承漿泄牙疼而即移項強多惡風束骨相連於天柱熱病汗不出大都更接於經渠且如兩䚡頑麻少海就傍於三里半身不遂陽陵遠達於曲池建里內關掃盡胸中之苦悶聽會脾俞祛殘心下之悲悽久知脅肋疼痛氣戶華蓋有靈腹內腸鳴下脘陷谷能除胸脅肢滿何療章門不用細推膈疼飲蓄難禁亶中臣闕便針胸滿更加噎塞中府意舍所行胸膈停留瘀血腎俞巨髎宜徵胸滿項強神藏璇璣已試皆連腰痛白環委中魯經脊強兮水道筋縮目眩兮顴髎大迎痓病非顱囟而不治愈臍風須然谷而易醒委陽天池腋腫針而速散後溪環跳腿疼刺而即輕夢魘不寧厲兌相諧於隱白髮狂奔走上脘同起於神門驚悸怔忡取陽交解溪勿誤反張悲哭仗天衝大橫須精癲疾必身柱本神之令發熱仗少衝曲池之津歲熱時行陶道復求中俞理風癇常發神道須還心俞寧溫寒溫熱下髎定厥寒厥熱湧泉清寒栗惡寒二間疏通陰郤暗煩心嘔吐幽門開徹玉堂明行間湧泉主消渴之腎竭陰陵水分去水腫之臍盈癆瘵傳尸趨魄戶膏肓之路中邪霍亂尋陰谷三里之程治疸消黃諧後溪勞宮而看倦言嗜臥往通天大鐘而明咳嗽連聲肺俞須明天突穴小便赤澀兌端獨泄太陽經刺長強與承山善主腸風新下血針三陰與氣海專司白濁久遺精且如肓俞橫骨泄五淋之久積陰郤後溪治盜汗之長生脾虛谷以不消脾俞膀胱俞覓胃冷食而難化魂門胃俞堪求鼻痔必取齦交癭氣須求浮白大敦照海患寒症而善蠲五里臂臑主瘭瘡而能心至陰屋翳療遍身癢疾之疼多肩髃陽溪消隱疹風斑之熱極抑又論婦人經事改常自有地機血海女子少氣漏血不無交信合陽帶下産崩衝門氣衝宜審月潮違限天樞水泉細詳肩井乳癰而極效商丘痔漏而最良脫肛趨百會尾翠之所無子搜陰交石關之鄉中脘主乎積痢外丘收乎大腸寒瘧兮商陽太溪驗痃癖兮衝門血海強夫醫乃入之司非志士而莫為針乃理之玄徵須人之指教必先究其病源而後攻其穴道隨手見功應針取效知玄理之玄始達妙中之妙此篇不盡略舉其要玉龍賦夫參博以為要轉簡而舍煩總玉龍以成賦信金針以獲安原夫率暴中風頂門百會腳氣連延里絶三交頭風鼻淵上星可用耳聾腮腫聽會偏高攢竹頭維治目疼頭痛乳根腧府療嗽氣痰哮風市陰市驅腿腳之乏力陰陵陽陵除腿腫之難熬二白醫痔漏間使剿瘧疾大敦去疝氣膏肓補虛勞天井治瘰癧癮疹神門治呆癡笑跳咳嗽風痰太淵列缺宜刺尫羸喘促璇璣氣海當知期門大敦治堅痃疝氣勞宮太陵療心悶瘡痍心悸虛煩刺三里時疫痎瘧尋後溪絶骨三里陰交腳氣宜灸睛明太陽魚尾目症憑茲老者尿多命門腎俞而著艾婦人乳腫少澤與太陽之可推身柱蠲嗽能除膂痛至陰卻疸善治神疲長強與承山灸痔最妙豐隆並肺俞痰嗽稱奇風門主傷胃寒邪之嗽天樞理感患脾泄之危風池絶骨而療乎樞倭人中曲池可治其委傴期門刺傷寒未解經不再傳鳩尾針癇顛已發慎其妄施陰交水分三里蠱脹宜刺商丘解溪丘墟腳痛堪追尺澤理筋急之不幸脘骨療手足之難移肩脊痛於五樞兼於背縫肋攣痛兮尺澤合與曲池風濕搏於兩肩髃可療壅熱盛乎三焦關衝最宜手臂紅腫中渚液門要辨脾虛黃膽腕骨中腕何疑傷寒無汗攻復溜宜瀉傷寒有汗取合谷當隨欲調飽滿之氣逆三里可勝要起六脈之沉匿復溜稱神照海支溝通大便之祕內庭臨泣理小腹之脂天突膻中醫喘嗽地倉頰車療口喎迎香攻鼻窒為最肩井治臂痛如拿二間治牙疼中魁理番胃而即瘥百勞止虛汗通里療心驚而不瘥大小骨空治眼爛能止冷淚左右太陽醫目痛善治血醫心俞腎俞治腰腎虛乏之夢遺人中委中治腰脊痛閃之難制太溪崑崙申脈最療足腫之迍湧泉關元豐隆為治尸勞之例印堂治其驚搐神庭理乎頭風大陵人中頻泄口氣全際帶脈關元多灸腎敗堪攻腿腳重疼針髖骨膝眼行步艱禁刺三里中封太衝取內關與照海醫腹疾之塊搐迎香與鼻內消眼熱之紅肚痛祕結太陵合外關與支溝腿風濕痛居髎兼環跳與委中上脘中脘治久種之心疼赤帶白帶求中極之異同又若心虛熱壅少衝明於濟奪目昏血溢肝俞辨其虛實當心傳之玄要究手法之疾徐或值唑閃疼痛之不足此為難擬定穴之可祛輯管見以便瀆幸高明而無哂諸靈光賦黃帝岐伯針法決依他經里分明説三陰三陽十二經更有兩經分八脈靈光典注極幽深偏正頭疼瀉列缺睛明治眼胬肉攀耳聾氣痞聽會間兩鼻鼻翁衄針禾髎鼻窒不聞迎香間治氣上壅足三里天突宛中治喘痰心疼手顫針少海少澤應除心下寒兩足拘攣覓陰市五般腰痛委中安脾俞不動泄丘墟復溜治腫如仙醫犢鼻治療風邪痰住喘腳痛在僕崑崙愈後頭痛參求承山筋轉並久痔足掌下去尋湧泉此法千金莫妄傳此穴多治婦人疾男蠱女孕兩痛痊百會鳩尾治痢疾大小腸俞大小便氣海血海療五淋中脘下脘治腹堅傷寒過經期門穴氣刺兩乳求太淵大敦二穴主偏墜水溝間使治邪顛吐血定喘補尺澤地倉補止兩流涎勞宮醫得身勞倦水腫水分久即安五指不申中渚取頰車可針牙齒愈陰蹺陽蹺兩踝邊腳氣四穴先尋取陰陽陵泉亦主之陰蹺陽蹺與三里諸穴一般治腳氣在腰玄機宜正取膏肓豈止治百病灸在玄切病須愈針灸一穴數病除學者尤宜加仔細悟得明師流注法頭目有病針四肢針有補瀉明呼吸穴應五形順四時悟得人身中造化此歌依舊縣筌蹄攔江賦擔截之中法數何有擔有截起沉疴我今作此攔江賦何用三車五軸歌先將八法為定例流注之中分次第心胸之病內關擔臍下公孫用法擔頭部須逢尋列缺痰涎壅塞及咽乾噤口喉風針照海三稜出血刻時安眼目之症諸疾苦更用臨泣使針擔後溪專治督脈病癲狂此法治還輕申脈能除寒與熱頭風偏正及心驚耳鳴鼻衄胸中滿好用金針此穴尋但遇癢麻虛即補如逢疼痛瀉而迎更有傷寒真妙訣三陰須要朝陽經無汗更將合谷補復溜穴瀉好用針倘若汗多流不絶合谷補收效如神四日太陽宜細辨公孫照海一般行再用內關施截法七日期門可用針但治傷寒皆用瀉要知素問坦然明流注之中八造化常將水火土金平春夏井榮宜刺淺秋冬經合更宜深天地四時同此數三才常用記心胸天地人部次第入仍調各部一般勻夫弱婦強亦有克婦弱夫強亦有刑皆在本經擔與截瀉南補北亦須分經絡明時知造化不得師傳枉用心不遇至人應不授天寶豈可付非人按定氣血病人呼重搓數十把針扶戰提搖起向上使氣自流行病自無席弘賦凡欲行針須審穴要明補瀉迎隨訣胸背左右不相同呼吸陰陽男女彆氣刺兩乳求太淵未應之時瀉列缺列缺頭疼及偏正重瀉太淵無不應耳聾氣痞聽會針迎香穴瀉效如神誰知天突治喉風虛喘須尋三里中手連肩脊痛難忍合谷針時要太衝曲池兩手不如意合谷下針宜仔細心疼手顫少海間若要除根陰市安但患傷寒兩耳聾金門聽會疾如風五般肘痛尋尺澤太淵針後卻收功手足上下針三里食癖氣塊憑此取鳩尾能治五般癇若下湧泉人不死胃中有積刺璇璣三里功多人不知陰陵泉治心胸滿刺到承山飲食思大杼若連長強尋小腸氣痛即行針委中專治腰間痛腳膝腫時尋至陰氣滯腰疼不能立橫骨大都宜救急氣海專能治五淋更針三里隨呼吸期門穴主傷寒患六日過經尤未汗但向乳根二肋間又治婦人生産難耳內蟬鳴腰欲折膝下明存三里穴若能補瀉五會間切莫向人容易説睛明治眼未效時合谷光明安可缺人中治顛功最高十三鬼穴不須饒水鍾水分兼氣海皮內隨針氣自消冷嗽先宜補合谷卻須針泄三陰交牙疼腰痛並喉痹二間陽溪疾怎逃更有三間腎俞妙善治肩背浮風勞若針肩井須三里不測之時氣未調最是陽陵泉一穴膝間疼痛用針燒委中腰痛腳攣急取得其經血自調腳痛膝腫針三里懸鐘二陵三陰交更向太衝須引氣指頭麻木自輕飄轉筋目眩針魚腹承山崑崙立便消肚疼須是公孫妙內關相應必然瘳冷風冷痹疾難愈環跳腰間針與燒風府風池尋得到傷寒百病一時消陽明二日尋風府嘔吐還須上脘高婦人心痛心隆穴男子痃癖三里高小便不禁關元好大便閉塞大敦燒脘骨腿痛三里瀉復溜氣滯便離腰從來風府最難針郤用工夫度淺深倘若膀胱氣未散更宜三里穴中尋若是七疝小腹痛照海陰交曲泉針又不應時求氣海關元同瀉效如神小腸氣撮痛連臍速瀉陰交莫在遲良久湧泉針取氣此中玄妙少人知小兒脫肛患多時先灸百會次鳩尾久患傷寒肩背痛但針中渚得其宜肩上痛連臍不休手中三里便須求下針麻重即須瀉得氣之時不用留腰連胯痛急必大便於三里攻其隘下針一瀉三補之氣上攻噎只管在噎不住時氣海灸定瀉一時立便瘥補自卯南轉針高瀉從卯北莫辭勞逼針瀉氣令須吸右補隨呼氣自調左右捻針尋子午抽針行氣自迢迢用針補瀉分明説更用搜尋本與標咽喉是急先百會太衝氣海及陰交學者潛心須讀熟席弘治病最名高八法八穴歌西江月九種心疼涎悶結胸翻胃難停酒食積聚胃腸鳴水食氣疾膈病臍痛腹疼兼血脹腸風瘧疾心疼胎衣不下血迷心瀉瀉公孫立應中滿心胸痞脹腸鳴水瀉脫肛食難下膈酒來傷積塊堅橫脅搶奶女血痛心疼結胸裡急難當傷寒不解結胸堂瘧疾內關獨當手足中風不舉痛麻發熱拘攣頭風痛腫頂腮連眼腫赤疼頭於齒疼耳聾咽腫浮風瘙癢筋牽腿疼脅脹肋肢偏臨泣針時有驗肢節腫痛臂冷四肢不遂頭風背胯內外骨筋攻頭頂眉稜眥痛手足熱麻盜汗破傷眼腫睛紅傷寒自汗表烘烘獨會外關為重手足急攣戰掉中風不語癇癲頭疼眼腫淚連連腿膝背腰痛遍項強傷寒不解牙齒腮腫紅咽手麻足破又傷牽盜汗後溪先砭腰背項疼腿腫思風自汗頭疼頭眩赤目痛眉稜手足麻攣臂冷吹乳耳聾鼻衄癇顛肢節煩憎遍身腫滿汗頭淋申脈先針有驗痔瘧便腫瀉利吐紅溺血咳痰牙疼喉腫小便難心胸股疼飲噎産後發強不語腰疼血疾臍寒列缺乳癰多散死胎不下膈中寒喉塞小便淋瀝膀胱氣痛腸鳴食黃酒積腹臍疼嘔泄胃番便緊難産昏迷積塊腸風下血常頻膈中決氣痰侵照海有功議定清江引青囊祕訣傳與爾恁君休浪費聲聲皆聖言句句咸神議不是妙人休潰與不是妙人休潰與十四經步穴歌太陰肺兮出中府雲門之下一寸許雲門氣戶旁二寸人迎之下二骨數天府腋下三寸求俠白肘上五寸主尺澤肘中約紋論孔最脘中七寸取列缺腕側寸有半經渠寸口陷中取太淵掌後橫紋頭魚際節後散脈學少商大指內側尋此穴若針疾減愈手陽明經屬大腸食指內側起商陽本節