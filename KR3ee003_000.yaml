焦氣納鄉丁日心家出井中丁未之時過少衝己酉大都脾上位肺行辛亥太淵從癸丑腎居復溜位曲泉卯乙注肝宮丁己流於包絡上厥陰心主起中衝戊日胃井卻如何戊午先從廉兌過庚申二間是膀胱束骨戌無瘥取過為原衝陽位甲子膽經陽輔叔刀丙寅小海小腸合三焦氣納戊辰多己日脾家井要知隱白己己起根基辛未肺經注魚際癸酉腎經是太溪肝經己亥中封穴丑時少海在心移己亥心包定無異陰陽消息要躊躇庚日大腸向井求商陽辰土起為頭壬午膀胱流通看甲申臨泣膽中遊若問其原是合谷丙戌陽谷小腸流戊子三里胃為合寅時三焦更未休辛日肺井何處輪少商辛卯最分明癸己腎經然谷穴乙未肝藏太衝臨丁酉心是窗道上陽陵泉亥是脾經辛丑之時屬包絡逐穴流注要思尋壬屬膀胱井何看壬寅生井注至陰辰上俠溪行膽位小腸丙午後溪端京骨穴中原所過解溪申上胃相連庚戌大腸曲池合壬子三焦非前原癸日腎井何方是湧泉癸亥起為頭乙丑肝家行間內神門丁卯在心收己己商丘脾過處辛未尺澤肺家求酉時血納心包絡始信陰陽不暫留六十六穴妙難求十二經中仔細搜井榮俞經合五位木火土金水注流遂經子母相生過晝夜循環無盡頭十經氣血皆出為井入為合各注井榮俞經合無休已二曰脈有十二經又曰何只言十經其餘二經不言者何答曰其二經者三焦是陽氣之父心包絡是陰血之母此二經蓋重水系五行所攜主受納十經血氣養育故只言十經陰陽二脈逐曰各注井榮俞經合各五時辰畢則歸其本此二經亦各注井榮俞經合五穴方知十二經之遍行也標幽賦拯救之法妙用者針言劫病之功莫妙於針刺察歲時於天道夫人身有十二經三百六十節以應一歲十二月三百六十日歲者素問云必先歲氣兼代天和是謂至治時者四時也經六四時者所以分春夏秋冬之氣所在以調之也天道者經雲天氣溫和則經水安靜天寒地凍則經水凝滯天暑地熱則經水沸溢卒風暴熱則經水沸而隴起又天溫日明則人血淖液而衛氣浮故血易泄氣易行天寒日陰則人血凝滯而衛氣沉月始生則氣血始精衛氣始行月廓滿則氣血實肌肉堅月廓空則肌肉減經絡虛衛氣去形獨居是以因天時而調氣血也定形氣於豫心此言用針者當識歲時之氣候察天道之寒溫月廓之盈虧以定患人形之肥瘦氣之虛實於我心實則瀉之虛則補之以平調為期斯則形氣已得豫心而所謂順天之道也春夏瘦而刺淺秋冬肥而刺深內經云病有浮沉刺有深淺各正其理兼過其道過之則內傷不及則外壅壅則邪從之深淺不得及為大賊內傷五臟後生大病故曰春病在毫毛腠理夏病在皮膚故春夏之氣在外人之氣亦輕浮肌肉瘦薄血氣未盛凡刺者應當淺取之秋病在肌肉冬病在筋骨故秋冬之氣收藏在內人氣亦藏肥肉肥厚血氣充滿凡刺者故當深取之不窮經絡陰陽多逢刺禁經有十二經絡有十五絡陰陽者天之陰陽平旦至日中天之陽陽中之陽也曰中至黃昏天之陽陽中之陰也合夜至雞鳴天之陰陰中之陰也雞鳴至平旦天之陰陰中之陽也人之陰陽則外為陽內為陰身之陰陽則背為陽腹為陰手足皆以赤白際分之言臟腑之陰陽則臟為陰府為陽是以春夏之病在陽秋冬之病在陰皆視其所在與施針後也既論臟腑虛實須向經尋臟居乎內經絡行乎外其臟腑之虛實既定乃取其經而治之虛則補其母實則泄其子如心病虛則補肝木實則泄脾土又本經亦有子母如心之虛取少海以補之實則取少府泄之又如太陽肺屬金病實則泄本經之合水尺澤水是子虛則補本經之俞土太淵上是母故曰須向經尋諸經皆然並不離五形相生之理也原夫起自中焦水初下漏太陰為始至厥陰而方終穴出雲門抵期門而最後此言平人氣血氣脈行於十二經為周身除任督之外計三百九十三穴一日一夜有百刻分於十二時每一時有八刻二分每一刻計六十分一時共計五百分起至中焦者蓋中焦在胃中腕當臍上四寸不上不下之分五臟皆稟於胃胃者五臟之本故五臟氣不能自致於手太陰肺經必因胃氣乃致於手太陰肺經經雲谷入於胃播氣於肺故脈假胃氣自寅時起沿中焦上注於肺初行一時呼吸氣計一千一百二十五息血行計六十七丈五尺至卯時注大腸經呼吸氣計二千二百五十息血行一百三十五丈至辰時注於胃經呼吸氣計三千三百七十五息血行二百二丈五尺己時注於脾經呼吸氣計四千五百息血行二百七十丈午時注於心經呼吸氣計五千六百二十五息血行三百三十七丈五尺未時注小腸經呼吸氣計六千七百五十息血行四百五文申時注於膀胱經呼吸氣計七千八百七十五息酉時注於腎經呼吸氣計九千息血行五百四十丈戌時注於心包絡呼吸氣計一萬一百二十五息血行六百七丈五尺亥時注於三焦經呼吸氣計一萬一千二百五十息血行六百七十五丈子時注於膽經呼吸氣計一萬二千三百七十五息血行七百四十二丈五尺丑時注於肝經呼吸氣計一萬三千五百息血行八百一十丈故曰太陰為始至厥陰而方終矣手太陰肺經自寅時起從中府穴出注於手陽明經歷胃脾心小腸膀胱中焦胃腕致於腎心包絡三焦膽至厥陰肝經而終此蓋引其經之傳注而言則雲門而如其經傳注從第其穴則自期門而止所謂穴出雲門抵期而最後也正經十二別絡走三百餘支凡人手足三陰三陽之脈各為正經其經之別走者為絡蓋三百六十五支而絡三百六十五穴故曰正經十二別絡走三百餘支也銅人指要賦行針之士要辨沉浮脈明虛實針別淺深經脈絡脈之別巨刺繆刺之分經絡閉塞須用砭針疏導臟腑寒溫必明淺深補瀉經氣之正自有常數漏水百刻五十度周經絡流注各應其時先脈訣病次穴蠲疴左手掐穴右手置針刺榮無傷衛刺衛無傷榮氣悍則針小而入淺氣澀則針大而入深氣滑出疾氣澀出遲深則欲澀淺則欲疾候其氣至必辨於針徐而疾者實實而遲者虛虛則實之滿則泄之宛陳則除之邪勝則虛之刺虛者須其實刺實者須其虛經氣已至慎守勿失謹守其法勿更變也賊邪新客未有定處推之則前引之則至其來不可逢其往不可追損其有餘補其不足先去血脈而後調之無問其病以平為期若有若無若得若失五臟已定九候已傋診脈病明行針疾愈衆脈不見衆凶不聞外內相得無以形先可玩往來乃施於人手動若務針耀而勻伏如橫弩起若發機見其烏烏見其稷稷從見具飛不知其誰靜意是義觀適之變是謂冥冥莫知其形如臨深淵手如握虎如待所貴不知日暮其氣已至適而自護五虛勿近五實不遠捫而循之切而散之推而接之彈而弩之爪而下之通而取之陰募在腹陽俞在背臟病取原府病取合臟病腑募治腑病臟募治出入導氣補泄同精善行水者不能注冰善穿地者不能鑿凍權衡以平氣口成寸以決死生飲食入胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱食氣入胃散精於肝淫氣於筋食氣入胃濁氣歸心淫精於肺五勞五痹九氣七情六淫六腑九竅九州四氣三因傷風傷寒雜病奇病婦人小兒盛則瀉之虛則補之不實不虛以經取之手太陰肺經之圖凡十一穴左右雲門共二十二穴太陰肺兮出中府雲門之下一寸許雲門氣戶旁二寸人迎之下二骨數天府腋下三寸求俠白肘上五寸主尺澤肘中約紋論孔最脘中七寸取列缺腕側寸有半經渠寸口陷中取太淵掌後橫紋頭魚際節後散脈奉少商大指內側尋此穴若針疾減愈手太陰肺中焦生下絡大腸出賁門上膈屬肺從肺繫系橫出腋腨中行肘臂寸口上魚際大指內側爪甲根支絡還從腕內出接次指屬陽明經此經多氣而少血是動則病喘咳發肺脹膨膨缺盆痛兩手交瞀為臂厥所生病者為氣喘咳渴煩心胸滿結臑臂之外前廉痛小便頻數掌中熱氣虛肩背痛而寒氣盛亦疼風汗出火神少氣不足息遺失無度溺色赤手陽明大腸經之圖凡二十穴左右共四十手陽明經屬大腸食指內側起商陽本節前取二間定本節後取三間強岐骨陷中尋合谷陽溪腕中上側詳腕後三寸定偏歷五寸之中溫溜當下廉上廉各一寸上廉此下一寸方屈肘曲中曲池得池下二寸三里場肘髎大骨外廉陷五里肘上三寸量臂臑髃下一寸取肩髃肩端兩骨當巨骨肩端叉骨內天鼎缺盆之上藏扶突曲頰下一寸禾窖五分水溝旁鼻孔兩旁各五分左右二穴皆迎香陽明之脈手大腸次指內側起商陽循指上廉出合谷兩筋岐骨循臂昉入肘外廉循臑外肩端前廉柱骨旁從肩下入缺盆內絡肺下膈屬大腸支沿缺盆直上頸斜貫頰前下齒當環出人中交左右上俠鼻孔注迎香此經氣盛血亦盛是動頸瘇並齒痛所生病者為鼻衄目黃口乾喉痹生大指次指難為用肩前臑外痛相仍氣有餘兮脈熱腫虛則寒栗病偏增足陽明胃經之圖凡四十五穴左右共九十胃之經兮足陽明頭維本神寸五尋下關耳前動脈是頰車耳下八分針承泣目下七分取四白一寸不可深巨髎孔旁八分定地倉夾吻四分迎大迎曲頰前二寸人迎結旁大脈直水哭在頸大筋下直至氣舍上人迎氣舍迎下夾天突缺盆橫骨陷中親氣口俞府旁二寸至乳六寸又四分庫房屋翳膺窗近乳中正對乳中心次有乳根出乳下各一寸無不相侵穴夾幽門一寸五是穴不容依法數其下承滿至梁門關門太乙從頸峰節次續排滑囟門各各一十為君數天樞正在夾臍旁外陵樞下一寸當二寸大巨五水道歸來七寸以尋將氣衝曲骨旁二寸來下鼎上腋中央髀關兔後六寸分伏兔市上三寸強陰市膝上三寸許梁丘二寸得其場膝臏骭下尋犢鼻膝眼二災分兩旁膝下三寸求三里下三寸上廉地條口上廉下一寸下廉條下一寸系豐隆下廉外一寸上踝八寸分明記解溪衝陽後寸半衝陽陷上二寸系陷谷內庭後寸半內庭次指外間是厲兌大指次指端去爪如韭胃所起胃是陽明交鼻起下循鼻外下入齒環出俠口繞承漿頤後大迎頰車裡耳前髮際至額頤支下人迎缺盆底下膈入胃絡脾宮五者缺盆下乳內一交幽門循腹裡下行直令氣衝中遂由髀關抵膝臏䯒骨付中指內關同一支下膝注三里別出中指外關通一支別走足跗指大指之端經盡矣此經多氣復多血是動欠伸面顏黑悽悽惡寒畏見人忽聞木聲心驚惕登高而歌棄衣走甚則腹脹仍賁響凡此諸疾皆骭厥所生病者為狂瘧濕溫汗出鼻流血口喎唇裂又喉痹膝臏疼痛腹脹結氣膺伏兔䯒外廉足跗中指俱痛徹有餘消穀溺色黃不足身前寒振栗胃房脹滿食不消氣盛身前皆有熱足太陰脾經之圖凡二十一穴左右共四十二穴拇指內側隱白位大都節後陷中趙太白核骨下陷中公孫節後一寸止商丘有穴屬經金踝下微前陷中是內踝三寸三陰交漏谷六十有次弟膝下五寸為地機陰陵內側膝輔際血海分明膝臏上內廉肉際二十地箕門血海上六寸筋間動脈須詳諦衝門五寸大橫下三寸三分尋府舍腹結橫下寸三分大橫夾臍非此假腹哀寸半去日月直與食竇相連並食竇天溪及胸鄉周榮各一寸六者大包淵液下三寸出九筋間當記也太陰脾起足大指上循內側白肉際核骨之後內踝前上臑循䯒脛膝里股內前廉入腹中屬脾絡胃與膈通俠喉連舌散舌下支絡從胃經心宮此經氣盛而血衰是動其病氣所為食下即吐胃脘痛更兼身體痛難移腹脹善噫舌本強所生病者舌亦痛體重不食亦如之煩心下仍急痛泄水溏瘕寒瘧隨不臥強立股膝腫膽發手少陰心經之圖凡九穴左右共十八穴少陰心起極泉中腋下筋間脈入胸青靈肘節上三寸少海肘內節後容靈道掌後一寸半通里腕後一寸同陰郤五分取動脈神門掌後兌沖隆少府節後勞宮直小指內側取少衝手少陰經起心中下膈直與小腸通支者還從肺系走直上咽喉系目瞳直者上肺出夜下臑後肘內少海從臂內後廉抵掌中鋭骨之端注少衝多氣少血屬此經是動心疲痛難忍渴欲飲水咽乾燥所生脅痛目如金脅臂之內後廉痛掌中有熱向經尋手太陽小腸經之圖凡一十九穴左右共三十八穴手小指端為少澤前谷外側節前索節後陷中尋後溪腕骨陷前看外側脘中骨下陽谷討腕上一寸名養老支正腕後量五寸小海肘端五分好肩貞脾下兩骨解臑俞大骨之下保天宗骨下有陷中秉風髎後舉有空曲垣肩中曲脾裡外俞脾後一寸從肩中二寸大杼旁天窗頰下動脈詳天容耳下曲頰後顴髎面頰鋭端詳聽宮耳端大如菽此一為經手太陽手太陽經小腸脈小指之端起少澤循手外廉出踝中循臂骨出肘內側上循臑外出後廉直過肩解繞肩甲交肩下入缺盆內向腋絡心循咽嗌下膈低胃屬小腸一支缺盆貫頸頰至目鋭眥卻入耳復從耳前仍上頰抵鼻外至目內眥斜絡於顴別絡接此經少氣還多血是動則病痛咽嗌頷下腫兮不可顧肩如拔兮臑如折所生病生肩臑痛耳聾目黃腫腮頰肘之外後廉痛部分猶當細分別足太陽膀胱經圖凡六十三穴左右共百一十六穴足太陽兮膀胱經目眥內角始睛明眉頭陷中攢竹名曲差二穴神庭伴五處挨排夾上星承光五處後寸半通天路卻一停勻玉枕橫夾於腦戶尺寸當準銅人經天柱夾頂後髮際大筋外廉陷中是夾脊相去寸五分第一大杼二風門肺俞三椎厥門四心腧五椎之下論督腧膈俞相梯級第六第七次第立第八椎下穴無有肝俞數椎當第九十椎脾俞脾十一十三椎下胃俞取三焦腎俞氣海俞十三十四十五究大腸關元俞安量十六十七椎兩旁十八椎下小腸俞十九椎下尋膀胱中膂內俞椎二十白環二十一椎當上髎次髎中與下一空二空夾腰胯並同夾脊四個髎載在千金君勿訝會陽陰尾兩旁分尺寸須看督脈云第二椎下外附分夾脊相去上法論先從脊後量三寸不是灸狹能傷筋魄戶三椎膏肓四四五三分分明是第五椎下索神堂第六譩嘻外可睹膈關第七魂門九陽綱意舍十十一胃倉肓門屈指彈唯看寸二與十三志室次之為十四胞肓十九合參詳秩邊二十椎下詳承扶臀陰紋中央殷門承扶六寸直浮郤一寸上委陽陽卻與殷門並膕中外廉兩筋鄉委中膝膕約紋里此下三寸尋合陽承筋腨腸中央是承山腨下分內旁飛揚外踝上七寸附陽踝上三寸量金門正在外踝下崑崙踝後跟骨中僕參跟骨下陷是申脈分明踝下容京骨外側大骨下束骨本節後陷中通谷本節前陷取至陰小指外側逢足經太陽膀胱脈目內眥上起額尖支者巔上至耳角直者從巔腦後懸絡腦環出別下項仍循肩膊夾脊邊抵腰膂腎膀胱內一支下與後陽連賁臀斜入委中穴一支膊內左右別貫脾夾脊過脾樞臂內後廉膕中合下貫腨內外踝後京骨之下指外側此經血多氣猶少是動頭疼不可當項如拔兮腰似折髀強痛徹脊中央膕如結兮腨如裂是為踝厥筋乃傷所生瘧痔小指廢頭囟頂痛目色黃腰尻膕腳疼連背淚流鼻衄及顛狂足少陰腎經之圖凡二十七穴左右共五十四穴腎經起處有其所湧泉屈足卷指取然谷踝前大骨下踝後跟上大溪府溪下五分尋大鐘水泉溪下一寸許照海踝下陰蹺生踝上二寸復溜名溜前筋骨取交信赤白踝上二寸行築賓六寸腨分處陰谷膝下著骨輔橫骨有陷如仰月大赫氣穴四滿據中注肓俞正夾臍六穴五寸各一數商曲後關上陰都通谷幽門一寸居幽門半寸夾巨闕步廊神封過靈墟神藏域中入腧府各一寸六不差殊欲知俞府幾何分璇璣之旁各二寸足經腎脈屬少陰小指斜趨湧泉心然谷之下內踝後別入跟中腨內侵出膕內廉上股內貫脊屬腎膀胱臨直者屬腎貫肝鬲入肺循喉舌本尋支者從肺絡心內仍至胸中部分深此經多氣而少血是病飢不欲少食喘嗽吐血喉中鳴坐而欲起面如垢目視䀮䀮氣不足心懸如飢常惕惕所生病者為舌乾口熱咽痛氣賁逼股內後廉並脊疼心腸煩痛疸而僻痿厥嗜臥體怠惰足下熱痛皆腎厥手厥陰心包經之圖凡九穴左右共十六穴厥陰心包何處得乳後一寸天池索天泉腋下二寸求曲澤內紋尋動脈郤門去腕五寸通問使腕後三寸逢內關去腕才二寸大陵掌後兩筋中勞宮掌內屈指取中指之末取中衝手厥陰心主起胸屬包下膈三焦宮支者循胸出脅下下連腋三寸同仍上抵腋循臑內太陰少陰兩經中指透中衝支者別小指次指絡相通包絡少氣原多血是動則病手心熱肘臂攣急腋下腫甚則胸脅支滿經心中淡淡或六動善哭目黃面赤色所生病者為煩心心痛掌熱病之則手少陽三焦經之圖凡二十三穴左右共四十六穴三焦名指外關衝小次指間名液門中渚次指本節後陽池表腕上陷存腕上二寸外關絡支溝腕上三寸約會宗腕後三寸空須詳一寸毋令錯肘前五寸臂大脈外廉陷中三陽絡四續骨外並三陽天井肘上一寸側肘上二寸清冷淵消濼臂外肘分索臑會肩頭三寸中肩髎肩端臑上通天髎盆上毖骨際天牖旁頸後天容翳風耳後尖骨陷瘈脈耳後雞足逢顱囟耳後青絡脈角孫耳角開有空系竹肩頭陷中看禾窖耳前兌發同耳門耳殊當耳缺此穴禁針分明説手經少陽三焦脈起自小指次指端兩指岐骨手腕表上出臂外兩骨間肘後臑外循肩上少陽之後交別傳下入缺盆膻中分散絡心包鬲里穿支者膻中缺盆上上項耳後耳角旋屈下注頤仍住頰一支出耳入耳前卻從上關交曲頰至目內眥乃盡焉三焦少氣還多血是動耳鳴喉腫痹所生病者汗自出耳後痛廉目鋭眥肩臑肘臂盡皆疼小指次指亦如廢足少陽膽經之圖凡四十四穴左右共八十八穴少陽童髎起目外耳前陷中尋聽會上關耳前開口空頷厭腦空上廉揣懸顱正在曲角端懸釐腦空下廉看曲鬢偃耳正尖上率谷曲鬢半寸安本神耳上入髮際四分平橫向前是曲差之旁各一寸陽白眉上一寸記臨泣有穴當兩目直入髮際五分屬目窗正營各一寸承靈正後寸五録天衝耳上二寸居浮白髮際一寸符竅陰枕下動有空腕骨耳後四分通腦空正夾玉枕骨風池後髮際陷中肩井大骨前寸半淵液脈下三寸按輟筋平前卻一寸日月京門二寸半直下五分細求之京門監骨腰間看蒂脈季脅寸八分五樞帶下三寸間維道五寸三分得居窖八寸三分尋脅堂腋下看二肋環跳脾樞宛論兩手著腿風市謀膝上五寸中瀆搜陽關陽陵上三寸陽陵膝下一寸求陽交外踝斜七寸踝上七寸尋外丘光明際踝上五寸陽輔上四寸收懸鐘三寸看絶骨丘墟踝前陷中出臨泣寸半後俠溪五會一寸灸早卒俠溪少次岐骨間竅陽足小次指端足厥陰肝經之圖凡十三穴左右共二十六穴大敦拇指看毛聚行間逢尖動脈處節後有絡亙五位大沖之脈堪承據中封正在內踝前蠡溝踝上五寸注中都正在復溜宮陰陵膝尖兩折中膝關犢鼻下二寸曲泉紋頭兩筋逢相包四寸膝臏上內廉筋間索其當五里氣衝四寸半直下三寸除股內羊矢兩里三分下陽廉膝上橫紋胯羊矢氣衝旁一寸分明有穴君可問章門臍上二寸量橫取八寸開兩旁期門乳旁各一寸直下二寸兩肋詳厥陰足脈肝所絡大指之端毛際叢足跗上廉大沖分踝前一寸入中封上踝交出太陰後循膕內廉相股充環繞陰器抵小腹夾胃屬肝絡膽逢上貫鬲里布脅肋頰喉頂顙目系同脈上巔會督脈出支者還生目系中下絡頰裡環唇內支者便從膈肺通此經血多氣少焉是動腰疼俯仰難男疝女人小腹腫面塵脫色及咽乾所生病者為胸滿嘔吐動泄小便難或時遺溺並狐疝臨症還須仔細看督脈陽經之圖凡中行單穴計二十七穴督脈齦交唇縫鄉兌端正在唇中央水溝鼻下溝內索素窖宜向鼻端詳頭形北高面南下先以前後髮際量分為一尺有一寸發上五分神庭當庭上五分上星位囟會星上一寸強上至前頂一寸半半百會居中央神聰百會四面取各開一寸風癇主後頂強間腦戶三相去各是一寸五後發五分定啞門門上五分是風府上有大椎下尾胝分為一十有一椎古來自有拆量法靈樞凜凜不可欺九寸八分分之七二之七節如是椎大椎第一節上是第二節下陶道知身柱第三椎節下神道第五無足疑靈臺第六至陽七筋縮第九之下思脊中懸樞命門穴十一十三十四節陽關鎮住十六椎二十一下腰俞窺其下長強伏地取此穴針之去痔根任脈之圖會陰正在兩陰間曲骨臍下毛際安中極臍下四寸取三寸關元二石門氣海臍下一寸半復交臍下一寸論分明臍內號神闕水分一寸復上列下脘建里中上脘各各一寸為君説巨闕上脘上寸半鳩尾蔽骨五分按中庭膻中寸六分膻中兩乳中間看正堂紫宮及華蓋相去各寸六分美華蓋璣下一寸量璇璣突下一寸當天突結下究究取廉泉頷下骨尖旁承漿頤前唇稜下任脈之部宜審詳天星穴法之形圖秋夫療鬼十三針之格人中神庭風府始舌縫承漿頰車次少商大陵間使連乳中陽陵泉有據隱白行間不可瘥十三穴是秋夫置人中一穴名鬼宮少商二穴名鬼室隱白二穴名鬼節太陵一穴名鬼心行間二穴名鬼路風府一穴名鬼腕頰車二穴名鬼關承漿一穴名鬼門間使二穴名鬼臂神庭一穴名鬼光乳中一穴名鬼位陽陵一穴名鬼腿舌縫一穴名鬼身舌縫六者舌縫中間出紫血身重舌腫難言心經邪熱出為妙凡人有鬼病者須先針人中次第下針十二穴男先取左女先取右治病如神回陽九針圖回陽九針穴啞門勞宮三陰交湧泉太溪中脘接環跳三里合谷並此是回陽九針穴八脈之形圖公孫衝脈胃心胸內關陰維下總同臨泣膽經連帶脈陽維目鋭外關逢後溪督脈內眥頸申脈陽蹺絡亦通則缺肺任行脈系陰蹺照海嗝喉嚨眥脈起自下極俞並於脊裡上風府過腦額鼻入齦交為陽脈海多綱要任脈起於中極底上腹循喉承漿里陽脈之海任所為衝脈出包循脊中從腹會陰絡口唇女人成經為血室脈並少陰之腎經與任督本接陽會三脈並起而異行陽蹺起足之跟里循外踝上入風池陰蹺內踝循喉嗌本足陰陽脈別支諸陽交起陽維脈發足少陽築賓郤諸陽會起陽維脈太陽之郤金門是帶脈周回季脅間會於維道是少陽所謂奇經之八脈維立諸經乃順常子膽醜肝寅肺卯大腸辰胃己脾午心未小腸申膀胱酉腎戌心包絡亥三焦五臟正面之圖五臟背面之圖精溺之分圖命門大小腸膀胱論臟各有一腎獨有兩者何也然左為腎右為命門水火也亦猶北方之蟲有龜陰物有蛇陽物所謂陽生於午火是臟之命門者原氣之所繫也男子以藏精女子以系胞其氣與腎通凡手少陰心經絡小腸手太陽小腸之經屬小腸手太陽肺之經絡大腸手陽明大腸之經屬大腸足少陰腎之經絡膀胱足太陽膀胱之經屬膀胱其大小腸之系則自膈之下與脊膂連心腎膀胱系脂膜筋絡散布包里然各分脈理罹絡大小腸與膀胱其細脈之中氣血津液流走之通也闌門水穀分別論扁鵲曰大腸小腸會處為闌門言闌約水穀從其泌別也其水穀自小腸承受於闌門以分別也其水則滲灌入於膀胱上口而為溲便若谷之津液則自闌門傳道於大腸故曰下焦者在膀胱上口主出而不內分別清濁也氣海膈膜之圖氣海膈膜論黃帝云膻中者臣使之官喜樂出焉膻中在兩乳間為氣之海也以氣布陰陽氣和志達則喜樂由生又云膈膜之上中有父母膈膜之上氣海居焉氣者生之原乃命之主故氣海為人之父母膈膜謂心肺之中也其膈膜自心肺之下與脊脅腹用回相著遮蔽如幕不漏濁氣上董於心肺也肺膜論胃為賁門飲倉下咽貴向聚乾咽也太倉者亦胃也肺以下右側可見心系干脊髓下通於胃黃帝書云七節之旁中有小心小心語真心神靈之宮室外不可針刺以今之所經藏象梭之其心之繫有二一則上與肺相連一則自心入於肺兩大葉之一曲折向後並脊膂細絡相連貫通脊髓而於腎系相通其下則於下文第七圖中開具矣其系從肺而大葉第向後附脊處正當七節之之矣故曰七節之旁中有小心也心系之圖心系詢五臟通於心心通五臟繫心之系與五臟之系相連輸其氣血滲灌骨髓故五臟有病先於於心其繫上繫於肺其別者自肺兩葉之中向後通髓脊著腎自腎之於膀胱膜絡並行而之於溲溺處也肺之一系者上通喉嚨其中與心系相通脾之系者自膈正中徹近左脅居胃之上並胃脘相連貫膈與心肺相通膈膜相綴也肝之系也自膈下著右脅肋上貫膈入肺中與膈膜相連也腎之系者貼脊膂脂膜中兩腎腎腎相通而下其上則與心肺系通為一也
